<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <title>harness_err</title>
  <link rel="stylesheet" href="css/style.css" />
  <script>
    window.__errs = [];
    window.__logErr = function (msg) {
      window.__errs.push(msg);
      var d = document.getElementById('errlog');
      if (d) d.textContent = window.__errs.join('\n----------\n');
      document.title = 'ERRS:' + window.__errs.length;
    };
    window.addEventListener('error', function (e) {
      window.__logErr('ERROR: ' + e.message + ' @ ' + (e.filename || '') + ':' + e.lineno + ':' + e.colno +
        '\n' + (e.error && e.error.stack ? e.error.stack : ''));
    });
    window.addEventListener('unhandledrejection', function (e) {
      var r = e.reason;
      window.__logErr('REJECTION: ' + (r && (r.stack || r.message) ? (r.stack || r.message) : String(r)));
    });
  </script>
</head>
<body>
  <div id="app">
    <header id="hud" class="hud"></header>
    <main id="screen" class="screen"></main>
  </div>
  <div id="toast" class="toast-area"></div>
  <pre id="errlog" style="position:fixed;left:0;top:0;z-index:99999;background:#300;color:#fff;font-size:12px;max-width:100%;white-space:pre-wrap;"></pre>

  <script src="js/config.js"></script>
  <script src="js/characters.js"></script>
  <script src="js/stocks.js"></script>
  <script src="js/professions.js"></script>
  <script src="js/gameState.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/bank.js"></script>
  <script src="js/newsSys.js"></script>
  <script src="js/markets.js"></script>
  <script src="js/eventCatalog.js"></script>
  <script src="js/events.js"></script>
  <script src="js/attacks.js"></script>
  <script src="js/botBrain.js"></script>
  <script src="js/greenhub.js"></script>
  <script src="js/sprite.js"></script>
  <script src="js/designer.js"></script>
  <script src="js/roadgrid.js"></script>
  <script src="js/map.js"></script>
  <script src="js/world2d.js"></script>
  <script src="js/windows.js"></script>
  <script src="js/turn.js"></script>
  <script src="js/resolve.js"></script>
  <script src="js/main.js"></script>

  <script>
    document.addEventListener('DOMContentLoaded', function () {
      var mode = (location.search.match(/[?&]mode=(\w+)/) || [])[1] || 'turn';
      setTimeout(function () {
        try {
          if (mode === 'rounds') {
            // วิ่งเอนจินครบ 10 รอบ × N เกม โดยข้าม UI เทิร์น: startRound → onRoundStart → endRound
            var nb = parseInt((location.search.match(/[?&]bots=(\d+)/) || [])[1], 10) || 3;
            for (var g = 0; g < 20; g++) {
              SC.newGame(nb);
              var s = SC.state;
              for (var w = 1; w <= SC.config.weeks; w++) {
                s.week = w;
                SC.startRound();
                SC.events.onRoundStart(s);
                SC.resolve.endRound();
              }
            }
            window.__roundsOk = true;
            document.title = 'ROUNDS OK';
          } else if (mode === 'reveal') {
            SC.flow.startGame(3);
          } else if (mode === 'attack') {
            SC.flow.startGame(parseInt((location.search.match(/[?&]bots=(\d+)/) || [])[1], 10) || 3);
            SC.turn._attackPhase(SC.state.player, function () {});
          } else if (mode === 'designer') {
            SC.main._bgStart();
            SC.designer.render(function () {});
          } else if (mode === 'menu2') {
            SC.main.renderModeSelect();
          } else if (mode === 'menu3') {
            SC.main.renderSetup();
          } else if (mode === 'map') {
            // แมปเปล่า + ambient (ไม่มี flow เกม/ดวล)
            SC.world.ensure().then(function () {
              var scr = document.getElementById('screen');
              scr.innerHTML = '<div id="mapWrap" style="position:fixed;inset:0"></div>';
              SC.world.mountInto(document.getElementById('mapWrap'));
              SC.world.spawnActor('Char_1', { charId: 1, name: 'ทดสอบ' });
              var last = performance.now();
              (function loop() {
                var now = performance.now();
                SC.world.tick(Math.min(0.05, (now - last) / 1000), 'player');
                last = now;
                requestAnimationFrame(loop);
              })();
            });
          } else if (mode === 'win') {
            var wid = (location.search.match(/[?&]id=(\w+)/) || [])[1] || 'crypto';
            SC.flow.startGame(3);
            SC.windows.open(wid, function () {});
            var csel = (location.search.match(/[?&]csel=(\w+)/) || [])[1];
            if (csel && wid === 'crypto') { SC.windows._csel = csel; SC.windows._renderCrypto(); }
          } else if (mode === 'disfire') {
            // ยิงภัยพิบัติกลางเฟสแมพจริงของผู้เล่น (ตรวจคัตซีน + การชดเชยนาฬิกา)
            SC.flow.startGame(3);
            SC.state.week = 3;
            SC.events.initState(SC.state);
            SC.state.events.pendingDisaster = { id: (location.search.match(/[?&]id=(\w+)/) || [])[1] || 'hurricane', actorId: 'player' };
            SC.turn._mapPhase(SC.state.player, function () {});
          } else if (mode === 'disaster') {
            // ตรวจโควตาภัยพิบัติต่อเกม (ควร ≈ weeks/10) + ไม่หลุดเข้าการสุ่มปกติ
            var out = {};
            [5, 10, 15, 20, 30].forEach(function (wk) {
              SC.config.weeks = wk;
              var counts = {}, bad = 0;
              for (var g = 0; g < 400; g++) {
                SC.newGame(3);
                var rs = SC.state.events.disasterRounds;
                counts[rs.length] = (counts[rs.length] || 0) + 1;
                for (var i = 0; i < rs.length; i++) {
                  if (rs[i] < 2 || rs[i] > Math.max(2, wk - 1)) bad++;
                  if (i && rs[i] - rs[i - 1] < 2) bad++;
                }
              }
              out['weeks' + wk] = { dist: counts, bad: bad };
            });
            // ภัยพิบัติต้องไม่ถูกสุ่มโดย _pickEvent เลย
            SC.config.weeks = 10; SC.newGame(3);
            var leak = 0;
            for (var t = 0; t < 4000; t++) {
              SC.state.week = 2 + (t % 8);
              SC.state.events.cooldown = {};
              var d = SC.events._pickEvent(SC.state, false);
              if (d && d.disaster) leak++;
            }
            out.pickLeak = leak;
            window.__disOut = out;
            document.title = 'DIS ' + JSON.stringify(out);
          } else if (mode === 'sim') {
            SC.newGame(3);
            var out = SC.events.simulate(1000);
            window.__simOut = out;
          } else {
            SC.flow.startGame(3);   // แจกการ์ด (renderReveal)
            SC.flow.startRound();   // เข้ารอบ 1 ทันที → onRoundStart → เทิร์นแรก
          }
        } catch (e) {
          window.__logErr('SYNC THROW: ' + (e.stack || e.message || e));
        }
      }, 300);
      setTimeout(function () {
        var scr = document.getElementById('screen');
        var st = document.createElement('pre');
        st.id = 'stateDump';
        st.textContent = '=== STATE DUMP ===\nerrs=' + window.__errs.length +
          '\nroundsOk=' + !!window.__roundsOk +
          '\nsimOut=' + (window.__simOut ? JSON.stringify(window.__simOut) : '-') +
          '\nscreen html len=' + (scr ? scr.innerHTML.length : -1) +
          '\nscreen first 600 chars:\n' + (scr ? scr.innerHTML.slice(0, 600) : 'NO SCREEN');
        document.body.appendChild(st);
      }, 7000);
    });
  </script>
</body>
</html>
